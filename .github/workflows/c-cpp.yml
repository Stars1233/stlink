name: C/C++ CI

on:
  push:
    branches: [master, develop, testing]
  pull_request:
    branches: [master, develop, testing]

jobs:
  # Linux builds with GCC and Clang on Ubuntu 22.04 and 24.04
  linux_64_bit:
    strategy:
      fail-fast: false
      matrix:
        config:
          # === Ubuntu 22.04 (Jammy Jellyfish) ===
          # GCC versions
          - name: Ubuntu22.04_x64 gcc11
            os: ubuntu-22.04
            cc: gcc-11
            cxx: g++-11
            packages: gcc-11 g++-11

          - name: Ubuntu22.04_x64 gcc12
            os: ubuntu-22.04
            cc: gcc-12
            cxx: g++-12
            packages: gcc-12 g++-12

          # Clang versions
          - name: Ubuntu22.04_x64 clang14
            os: ubuntu-22.04
            cc: clang-14
            cxx: clang++-14
            packages: clang-14

          - name: Ubuntu22.04_x64 clang15
            os: ubuntu-22.04
            cc: clang-15
            cxx: clang++-15
            packages: clang-15

          # === Ubuntu 24.04 (Noble Numbat) ===
          # GCC versions
          - name: Ubuntu24.04_x64 gcc13
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
            packages: gcc-13 g++-13

          - name: Ubuntu24.04_x64 gcc14
            os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
            packages: gcc-14 g++-14

          # Clang versions
          - name: Ubuntu24.04_x64 clang16
            os: ubuntu-24.04
            cc: clang-16
            cxx: clang++-16
            packages: clang-16

          - name: Ubuntu24.04_x64 clang17
            os: ubuntu-24.04
            cc: clang-17
            cxx: clang++-17
            packages: clang-17

          - name: Ubuntu24.04_x64 clang18
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
            packages: clang-18

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    env:
      CC: ${{ matrix.config.cc }}
      CXX: ${{ matrix.config.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt-get install ${{ matrix.config.packages }} libusb-1.0.0-dev libgtk-3-dev

      # Optional: Install CMake 3.20+ for modern CMake features
      - name: Install CMake (3.20+)
        run: |
          sudo apt update
          sudo apt install -y cmake
          cmake --version

      # Optional: Verify CMake version
      - name: Verify CMake version
        run: cmake --version

      - name: Prepare build directories
        run: mkdir -p ./build/{debug,release}

      - name: Configure project (Debug)
        working-directory: ./build/debug
        run: cmake ../.. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Debug

      # Parallel builds for faster execution
      - name: Build project (Debug)
        working-directory: ./build/debug
        run: cmake --build . --target all --parallel 4

      - name: Run tests (Debug)
        working-directory: ./build/debug
        run: ctest --force-new-ctest-process --parallel 4

      - name: Configure project (Release)
        working-directory: ./build/release
        run: cmake ../.. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

      # Parallel builds for faster execution
      - name: Build project (Release)
        working-directory: ./build/release
        run: cmake --build . --target all --parallel 4

      - name: Install project
        working-directory: ./build/release
        run: sudo cmake --build . --target install

      - name: Package project
        working-directory: ./build/release
        run: sudo cpack --config ./CPackSourceConfig.cmake ../debug/CPackSourceConfig.cmake

      - name: Uninstall project
        working-directory: ./build/release
        run: sudo cmake --build . --target uninstall

  # macOS builds with Clang (latest and LTS)
  macos_build:
    strategy:
      fail-fast: false
      matrix:
        config:
          # macOS Latest (Sonoma 14.x)
          - name: macOS-latest clang15
            os: macos-latest
            cc: clang
            cxx: clang++
            packages: ""

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    env:
      CC: ${{ matrix.config.cc }}
      CXX: ${{ matrix.config.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libusb

      # Optional: Install CMake 3.20+ for modern CMake features
      - name: Install CMake (3.20+)
        run: |
          brew install cmake
          cmake --version

      - name: Verify CMake version
        run: cmake --version

      - name: Prepare build directories
        run: mkdir -p ./build/{debug,release}

      - name: Configure project (Debug)
        working-directory: ./build/debug
        run: cmake ../.. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Debug

      # Parallel builds for faster execution
      - name: Build project (Debug)
        working-directory: ./build/debug
        run: cmake --build . --target all --parallel 4

      - name: Run tests (Debug)
        working-directory: ./build/debug
        run: ctest --force-new-ctest-process --parallel 4

      - name: Configure project (Release)
        working-directory: ./build/release
        run: cmake ../.. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

      # Parallel builds for faster execution
      - name: Build project (Release)
        working-directory: ./build/release
        run: cmake --build . --target all --parallel 4

      - name: Install project
        working-directory: ./build/release
        run: sudo cmake --build . --target install

      - name: Package project
        working-directory: ./build/release
        run: sudo cpack --config ./CPackSourceConfig.cmake ../debug/CPackSourceConfig.cmake

      - name: Uninstall project
        working-directory: ./build/release
        run: sudo cmake --build . --target uninstall

  # Windows builds with MSVC
  windows_build:
    name: Windows MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Install Visual Studio 2022 Build Tools
      - name: Install Visual Studio 2022 Build Tools
        run: |
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended"

      - name: Configure project (Release)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build project (Release)
        run: cmake --build build --config Release --parallel 4

      - name: Run tests (Release)
        working-directory: build
        run: ctest --output-on-failure --parallel 4

  # Cross-compilation for MinGW (Windows)
  mingw_cross_compile:
    name: MinGW Cross-Compilation (Windows)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64 libusb-1.0-0-dev mingw-w64

      - name: Cross-compile for Windows (x86-64)
        run: |
          mkdir -p build-mingw
          cd build-mingw
          cmake \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32 \
            -DLIBUSB_INCLUDE_DIR=/usr/include/libusb-1.0 \
            -DLIBUSB_LIBRARY=/usr/lib/x86_64-linux-gnu/libusb-1.0.a \
            -DSTLINK_GENERATE_GUI=OFF \
            ..
          make
          rm -rf build-mingw
